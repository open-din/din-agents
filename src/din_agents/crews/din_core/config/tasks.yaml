assess_patch_contract:
  description: >
    Analyze this request for din-core: {request}

    First, use the repo contract and change brief tools. Then use the file reader to inspect
    the actual repository: list the top-level directory, read relevant source files, existing
    docs, Cargo.toml, and any files the request would touch. Decide whether the request belongs
    in din-core, which crates or contract surfaces it touches, and whether it impacts react-din.

    Work from these inputs:
    - Repo path: {repo_path}
    - Canonical docs:
    {canonical_docs}
    - Boundaries:
    {boundaries}
  expected_output: >
    A markdown brief with ownership verdict, affected din-core surfaces, likely crates,
    public contract risk, sibling-repo coordination needed, and a summary of existing repo
    state based on what you read from the actual files.
  agent: patch_contract_steward
  markdown: true

review_registry_and_runtime:
  description: >
    Review the prior analysis and identify the exact registry, node ID, patch migration,
    round-trip, interface naming, FFI, or WASM implications of this request.

    Use the file reader to inspect actual source files in the repository: read crate lib.rs files,
    schema and fixture files, existing examples, and test files relevant to the request.
    Use the repo profile and quality gate tools again if needed.
  expected_output: >
    A markdown review listing registry and runtime risks, required schema or fixture touchpoints,
    and any release-gate concerns — grounded in actual file contents you read from the repo.
  agent: registry_parity_engineer
  markdown: true

plan_rust_validation:
  description: >
    Produce the final din-core execution brief for this request using the prior task outputs.

    Use the file reader to verify the current state of any files that need changing. If the
    request asks for concrete edits (documentation, examples, code), use the file writer to
    make those changes in the repository now. Read before writing.

    Include the exact quality gates below:
    {quality_gates}
  expected_output: >
    A final markdown plan containing the changes made (or recommended), cross-repo notes,
    acceptance criteria, and the exact Rust validation commands to run.
  agent: rust_quality_runner
  markdown: true
