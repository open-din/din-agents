assess_patch_contract:
  description: >
    Analyze this request for din-core and produce a **complete markdown brief**.

    Request: {request}

    Start from the already-routed control-plane inputs below. Keep your answer compact and
    decision-oriented; do not restate the whole request verbatim.

    Path: {repo_path}
    Route: {routing_route}
    Summary doc: {summary_path}
    API summary: {api_summary_path}
    Repo manifest: {repo_manifest_path}
    Routing reasons:
    {routing_reasons}
    - Entry points:
    {entry_points}
    - Hard boundaries:
    {hard_boundaries}

    Documentation-first workflow:
    - Treat the summary, API summary, repo manifest, and route card as the primary context.
    - Use the file reader only for exact follow-up files after that, preferring 1-3 targeted reads and never more than 4 reads total.
    - Do not list the whole repo or read large sources unless the request truly depends on them.
    - Avoid full schema or fixture reads unless a single exact field or enum is necessary to answer.

    Decide whether this belongs in din-core, which crates or contract surfaces it touches,
    and whether it impacts react-din.

    Your Final Answer MUST:
    - Be complete markdown with multiple `##` headings and concrete bullets.
    - Include a literal `Path:` line and a literal `Route:` line copied exactly from the inputs above.
    - NOT be a short preamble like "I will..." — deliver the full brief now.
  expected_output: >
    A markdown brief (with `##` headings) containing ownership verdict, affected din-core
    surfaces, likely crates, public contract risk, sibling-repo coordination needed, and a
    summary of existing repo state based on actual files read. Must include literal Path: and
    Route: lines copied from the pre-computed outputs.
  agent: patch_contract_steward
  markdown: true

review_registry_and_runtime:
  description: >
    Review the prior analysis and produce a **complete markdown review**.

    Path: {repo_path}
    Route: {routing_route}
    API summary: {api_summary_path}
    Repo manifest: {repo_manifest_path}
    Routing reasons:
    {routing_reasons}

    Use the file reader only for exact source files, fixtures, examples, or tests needed to
    resolve runtime and registry impact. Prefer focused reads over broad scans, and never more
    than 4 reads total for this task.
    Identify the exact registry, node ID, patch migration, round-trip, interface naming,
    FFI, or WASM implications of this request.

    If the injected prior-task section ends with a truncation note, rely on repo file reads
    and the verbatim request from inputs for missing detail.

    Request: {request}

    When `pub` rustdoc surfaces move, call out `./scripts/generate-docs.sh` alongside other
    quality gates so HTML docs and the short `docs/generated` index stay honest.

    Your Final Answer MUST:
    - Be complete markdown with multiple `##` headings and concrete bullets.
    - Include a literal `Path:` line and a literal `Route:` line copied exactly from the inputs above.
    - NOT be a short preamble — deliver the full review now.
  expected_output: >
    A markdown review (with `##` headings) listing registry and runtime risks, required schema
    or fixture touchpoints, and release-gate concerns — grounded in actual file contents read
    from the repo. Must include literal Path: and Route: lines.
  agent: registry_parity_engineer
  markdown: true

plan_rust_validation:
  description: >
    Produce the final din-core execution brief for this request.

    Path: {repo_path}
    Route: {routing_route}

    Use the file reader to verify only the exact files that need changing. Do not repeat broad
    repo discovery in this task. If the request asks for concrete edits (documentation,
    examples, code), use the file writer to make those changes in the repository now. Read
    before writing. If no edit is required, answer directly with the execution brief instead
    of calling tools again.

    Do not look up quality gates with tools. They are already injected below and must be copied
    exactly into the final markdown.

    Include the exact quality gates below:
    {quality_gates}
  expected_output: >
    A final markdown plan containing the changes made (or recommended), cross-repo notes,
    acceptance criteria, and the exact Rust validation commands to run.
  agent: rust_quality_runner
  markdown: true
