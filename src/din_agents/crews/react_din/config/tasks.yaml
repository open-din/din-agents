assess_public_surface:
  description: >
    Analyze this request for react-din: {request}

    Start from the already-routed control-plane inputs below.

    Path: {repo_path}
    Route: {routing_route}

    Work from these inputs:
    - Summary: {summary_path}
    - API summary: {api_summary_path}
    - Repo manifest: {repo_manifest_path}
    - Routing reasons:
    {routing_reasons}
    - Entry points:
    {entry_points}
    - Hard boundaries:
    {hard_boundaries}

    Documentation-first workflow:
    - Read the summary, API summary, and repo manifest first.
    - Use the file reader only for exact follow-up files after that, preferring 1-3 targeted reads and never more than 4 reads total.
    - Do not list the whole repo or broad-scan docs unless the request truly requires it.

    Determine whether the request belongs in react-din, which public library surfaces it touches,
    and whether it affects din-core or din-studio.
  expected_output: >
    A markdown brief with ownership verdict, affected public API or schema surfaces,
    package/export concerns, cross-repo coordination notes, and a summary of existing
    repo state based on what you read from the actual files.
  agent: patch_schema_steward
  markdown: true

review_docs_and_coverage:
  description: >
    Review the prior analysis and identify docs/components, coverage manifest,
    JSDoc, tests, or patch schema obligations that must move with this request.

    Path: {repo_path}
    Route: {routing_route}

    When public exports or package entrypoints change, remind implementers to run
    `npm run docs:generate` (also listed under quality gates) so TypeDoc output stays current.

    Use the file reader only for exact source, docs, and test files relevant to the request.
    Prefer targeted reads over broad directory scans.
  expected_output: >
    A markdown review listing required docs, tests, coverage-manifest updates,
    and any public release surface risks — grounded in actual file contents you read from the repo.
  agent: component_coverage_maintainer
  markdown: true

plan_library_validation:
  description: >
    Produce the final react-din execution brief for this request.

    Path: {repo_path}
    Route: {routing_route}

    Use the file reader to verify the current state of any files that need changing. Do not
    repeat broad repo discovery in this task. If the request asks for concrete edits, use the
    file writer to make those changes in the repository now. Read before writing. If no edit is
    required, answer directly with the execution brief instead of calling tools again.

    Do not look up quality gates with tools. They are already injected below and must be copied
    exactly into the final markdown.

    Include the exact quality gates below:
    {quality_gates}
  expected_output: >
    A final markdown plan containing the changes made (or recommended), public contract notes,
    acceptance criteria, and the exact TypeScript/library validation commands to run.
  agent: library_quality_runner
  markdown: true
